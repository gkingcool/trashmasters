spring.application.name=trashmasters


# MongoDB Configuration
# We use an environment variable so your password is never in the code
spring.data.mongodb.database=${MONGO_DB}
spring.data.mongodb.uri=${MONGO_URI}

# Logging
logging.level.org.springframework.data.mongodb.core.MongoTemplate=DEBUG

# in order to enforce unique ids, we have to add this
spring.data.mongodb.auto-index-creation=true

# Route Configuration — Station (truck garage) and Dump (landfill) coordinates
route.station.lat=47.6101
route.station.lon=-122.2015
route.dump.lat=47.5850
route.dump.lon=-122.1480

# Route Thresholds
route.threshold.physical=50.0
route.threshold.predicted=80.0
route.threshold.truck-dump-percent=0.85
route.threshold.dump-trip-minutes=30

spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE:true}

# === App Properties ===
app.frontend.url=${FRONTEND_URL:http://localhost:5173}
app.mail.from-name=${MAIL_FROM_NAME:Trash Masters Support}
app.reset.token.expiration=3600000

mapbox.api.token=${mapbox.api.token}
